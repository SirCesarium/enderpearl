version = 1
platform = "github"
lang = "rust"

[[artifacts]]
type = "bin"
name = "enderpearl"
outputName = "{name}-{os}-{arch}-{abi}"

# --- LINUX ---
[[targets]]
id = "linux-gnu-x64"
for = "enderpearl"
os = "linux"
arch = [ "x86_64" ]
abi = "gnu"
type = "bin"
packages = ["bin", "deb", "rpm"]

# --- WINDOWS ---
[[targets]]
id = "windows-msvc-x64"
for = "enderpearl"
os = "windows"
arch = [ "x86_64" ]
abi = "msvc"
type = "bin"
packages = ["bin", "msi"]

# --- MACOS ---
[[targets]]
id = "macos-arm64"
for = "enderpearl"
os = "macos"
arch = [ "arm64" ]
type = "bin"
packages = ["bin"]

[[publish]]
type = "builtin"
builtin = "download_artifact"
targets = "all"

[[publish]]
type = "builtin"
builtin = "github_release"
targets = "all"

[[publish]]
type = "composite"
name = "Publish to crates.io"
action = "cargo-publish"
secrets = ["CRATES_TOKEN"]
targets = "once"
