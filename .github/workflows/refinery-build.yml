name: Refinery Build
"on":
  push:
    tags:
      - v*
  release:
    types:
      - created
jobs:
  build:
    name: ${{ matrix.artifact }} (${{ matrix.os }}-${{ matrix.arch }}-${{ matrix.abi || 'default' }})
    runs-on: ${{ matrix.runs_on }}
    env:
      CARGO_PROFILE_RELEASE_STRIP: symbols
      CARGO_PROFILE_RELEASE_LTO: "true"
      CARGO_PROFILE_RELEASE_CODEGEN_UNITS: "1"
      CARGO_PROFILE_RELEASE_PANIC: abort
    strategy:
      fail-fast: false
      matrix:
        include:
          - artifact: enderpearl
            os: linux
            arch: x86_64
            runs_on: ubuntu-latest
            output_name: enderpearl-linux-x86_64-gnu
            artifact_bin: enderpearl
            target_triple: x86_64-unknown-linux-gnu
            package_type: tar.gz
            packages:
              - bin
              - tar.gz
              - deb
              - rpm
            has_deb: true
            has_rpm: true
            has_msi: false
            has_archive: true
            has_bin: true
            include_files: []
            apt_packages:
              - rpm
            bin_ext: ""
            abi: gnu
          - artifact: enderpearl
            os: windows
            arch: x86_64
            runs_on: windows-latest
            output_name: enderpearl-windows-x86_64-msvc
            artifact_bin: enderpearl
            target_triple: x86_64-pc-windows-msvc
            package_type: zip
            packages:
              - bin
              - zip
              - msi
            has_deb: false
            has_rpm: false
            has_msi: true
            has_archive: true
            has_bin: true
            include_files: []
            apt_packages: []
            bin_ext: .exe
            abi: msvc
          - artifact: enderpearl
            os: macos
            arch: arm64
            runs_on: macos-latest
            output_name: enderpearl-macos-arm64
            artifact_bin: enderpearl
            target_triple: aarch64-apple-darwin
            package_type: tar.gz
            packages:
              - bin
              - tar.gz
            has_deb: false
            has_rpm: false
            has_msi: false
            has_archive: true
            has_bin: true
            include_files: []
            apt_packages: []
            bin_ext: ""
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.target_triple }}
          cache: true
      - name: Setup Linker
        uses: MechanicalLabs/refinery/setup-linker@v0
        with:
          target-triple: ${{ matrix.target_triple }}
          extra-apt-packages: ${{ join(matrix.apt_packages, ' ') }}
      - name: Install System Dependencies (Windows) [WiX]
        if: runner.os == 'Windows' && matrix.has_msi
        run: >-
          choco install wixtoolset -y

          $wixDir = Get-ChildItem "${env:ProgramFiles}\WiX*", "C:\Program Files (x86)\WiX*" -Directory -ErrorAction
          SilentlyContinue | Sort-Object Name -Descending | Select-Object -First 1

          if ($wixDir -and (Test-Path "$($wixDir.FullName)\bin\candle.exe")) {
            Add-Content $env:GITHUB_PATH "$($wixDir.FullName)\bin"
          }
        shell: powershell
      - name: Set up MinGW (x86_64)
        if: runner.os == 'Windows' && matrix.abi == 'gnu' && matrix.arch == 'x86_64'
        uses: egor-tensin/setup-mingw@v3
        with:
          platform: x64
      - name: Set up MinGW (i686)
        if: runner.os == 'Windows' && matrix.abi == 'gnu' && matrix.arch == 'x86'
        uses: egor-tensin/setup-mingw@v3
        with:
          platform: x86
      - name: Build
        run: cargo build --release --target ${{ matrix.target_triple }}
        shell: bash
      - name: Prepare Binary
        run: |-
          SRC="target/${{ matrix.target_triple }}/release/${{ matrix.artifact_bin }}${{ matrix.bin_ext }}"
          DST_ORIG="target/release/${{ matrix.artifact_bin }}${{ matrix.bin_ext }}"
          DST_RENAMED="target/release/${{ matrix.output_name }}${{ matrix.bin_ext }}"

          mkdir -p target/release
          cp "$SRC" "$DST_ORIG"
          cp "$SRC" "$DST_RENAMED"
        shell: bash
      - name: Copy Extra Files
        if: ${{ matrix.include_files[0] }}
        run: |-
          for f in ${{ join(matrix.include_files, ' ') }}; do
            if [ -f "$f" ]; then
              cp "$f" "target/release/"
            fi
          done
        shell: bash
      - name: Install cargo-deb
        if: ${{ matrix.has_deb }}
        uses: MechanicalLabs/refinery/install-packager@v0
        with:
          tool: cargo-deb
      - name: Build .deb package
        if: ${{ matrix.has_deb }}
        run: |-
          mkdir -p _packages
          cargo deb --target ${{ matrix.target_triple }} --no-build -o _packages/
          for f in _packages/*.deb; do
            [ -f "$f" ] && mv "$f" "_packages/${{ matrix.output_name }}.deb"
          done
        shell: bash
      - name: Install cargo-generate-rpm
        if: ${{ matrix.has_rpm }}
        run: cargo install cargo-generate-rpm
        shell: bash
      - name: Build .rpm package
        if: ${{ matrix.has_rpm }}
        run: |-
          mkdir -p _packages
          cargo generate-rpm -o _packages/
          for f in _packages/*.rpm; do
            [ -f "$f" ] && mv "$f" "_packages/${{ matrix.output_name }}.rpm"
          done
        shell: bash
      - name: Install cargo-wix
        if: ${{ matrix.has_msi }}
        uses: MechanicalLabs/refinery/install-packager@v0
        with:
          tool: cargo-wix
      - name: Build .msi package
        if: ${{ matrix.has_msi }}
        run: |-
          mkdir -p _packages
          cargo wix --target ${{ matrix.target_triple }} -o _packages/
          $msi = Get-ChildItem "_packages\*.msi" | Select-Object -First 1
          if ($msi) { Rename-Item -Path $msi.FullName -NewName "${{ matrix.output_name }}.msi" }
        shell: pwsh
      - name: Export Binary
        if: ${{ matrix.has_bin }}
        run: |-
          mkdir -p _packages
          cp "target/release/${{ matrix.output_name }}${{ matrix.bin_ext }}" "_packages/"
        shell: bash
      - name: Package
        if: ${{ matrix.has_archive }}
        run: |-
          ARCHIVE_DIR="${PWD}/_packages"
          mkdir -p "$ARCHIVE_DIR"
          STAGING_DIR="target/archive_staging/${{ matrix.output_name }}"
          mkdir -p "$STAGING_DIR"
          cp "target/release/${{ matrix.output_name }}${{ matrix.bin_ext }}" "$STAGING_DIR/"
          for f in ${{ join(matrix.include_files, ' ') }}; do
            if [ -f "$f" ]; then
              cp "$f" "$STAGING_DIR/"
            fi
          done

          if [ "${{ matrix.package_type }}" = "zip" ]; then
            (cd "$STAGING_DIR" && 7z a -tzip "$ARCHIVE_DIR/${{ matrix.output_name }}.zip" .) > /dev/null
          else
            tar -czf "$ARCHIVE_DIR/${{ matrix.output_name }}.tar.gz" -C "$STAGING_DIR" .
          fi
        shell: bash
      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.output_name }}
          path: _packages/
  release:
    name: Release Artifacts
    needs:
      - build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v8
        with:
          merge-multiple: true
          path: ./artifacts
      - name: Display structure
        run: find ./artifacts -type f | sort
        shell: bash
      - name: Publish Release
        uses: softprops/action-gh-release@v3
        with:
          fail_on_unmatched_files: true
          files: ./artifacts/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
