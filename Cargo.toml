[package]
name = "enderpearl"
version = "0.1.1"
edition = "2024"
authors = ["SirCesarium"]
description = "Async proxy for Minecraft and HTTP traffic with automated server wake-up."
license = "MIT"
repository = "https://github.com/sircesarium/enderpearl"
homepage = "https://github.com/sircesarium/enderpearl"
documentation = "https://docs.rs/enderpearl"
readme = "README.md"

[dependencies]
clap = { version = "4.5", features = ["derive"], optional = true }
dashmap = "6.1.0"
futures = "0.3.32"
refractium = "1.0.2"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
tokio = { version = "1.49.0", features = ["full"] }

[features]
default = ["cli"]
cli = ["dep:clap"]

[[bin]]
name = "enderpearl"
path = "src/main.rs"
required-features = ["cli"]

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
panic = "abort"
