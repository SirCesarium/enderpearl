[package]
name = "mc-gate"
version = "0.1.0"
edition = "2024"

[dependencies]
clap = { version = "4.5.60", features = ["derive"] }
dashmap = "6.1.0"
futures = "0.3.32"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
t-port = { version = "1.1.0", default-features = false }
tokio = { version = "1.49.0", features = ["full"] }

[[bin]]
name = "mcg"
path = "src/main.rs"
